[pytest]
testpaths = testing
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    requires_model: test requires at least one LLM model loaded in LiteLLM
    requires_rag: test requires knowledge-index service and populated Qdrant collection
    requires_ki: test requires knowledge-index service reachable (no model needed)
    requires_gpu: test requires vLLM (GPU backend)
    deferred: test is deferred pending infrastructure (D-014 or pending Phase)

# Show extra test summary for skipped and failed tests
addopts = -v --tb=short -rNs
