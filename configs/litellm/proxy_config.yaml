# configs/litellm/proxy_config.yaml
#
# LiteLLM proxy configuration — mounted at /app/proxy_config.yaml in the container.
# Settings here supplement environment variable configuration (secrets, DATABASE_URL, etc.).
#
# Callbacks (execution order matters — reviewed before RAG query):
#   1. ContentReviewHook: regex gates A/B/C per D-039 Phase 1, then guard LLM D per Phase 2; rejects on violation
#   2. AsyncRAGHook: KI context injection per D-030
# Controlled by REVIEW_ENABLED env var — no-op when 'false'.
# Category D guard enabled when REVIEW_GUARD_MODEL env var is set (empty = skip).
#
# Reference: https://docs.litellm.ai/docs/proxy/config_settings

litellm_settings:
  drop_params: true
  callbacks:
    - hooks.content_review_hook
    - hooks.async_rag_hook
    - prometheus

general_settings: {}
