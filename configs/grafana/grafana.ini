# Grafana configuration
# Place at: $AI_STACK_DIR/configs/grafana/grafana.ini
# Mounted at /etc/grafana inside the grafana container.
# Datasources are provisioned automatically — see provisioning/datasources/

[server]
http_port = 3000
domain = grafana.localhost
root_url = https://grafana.localhost

[analytics]
reporting_enabled = false
check_for_updates = false

[security]
# Change admin_password before exposing to a network.
# For local testing, default admin/admin is acceptable.
admin_user = admin
admin_password = admin
disable_gravatar = true

[users]
allow_sign_up = false
allow_org_create = false

[auth]
# Anonymous access disabled — use admin credentials or Authentik SSO
disable_login_form = false

[paths]
provisioning = /etc/grafana/provisioning

[log]
mode = console
level = info
