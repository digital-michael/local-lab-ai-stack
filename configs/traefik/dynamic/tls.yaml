# Traefik dynamic configuration — TLS certificate store
# Hot-reloaded by Traefik file provider. No container restart needed.
# Place at: $AI_STACK_DIR/configs/traefik/dynamic/tls.yaml
#
# Replace cert paths with your actual certificate paths.
# For self-signed testing: see docs on generating a local CA.

tls:
  stores:
    default:
      defaultCertificate:
        # Files generated by scripts/generate-tls.sh
        certFile: /etc/traefik/tls/server.crt
        keyFile: /etc/traefik/tls/server.key
