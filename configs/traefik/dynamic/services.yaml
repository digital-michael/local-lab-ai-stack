# Traefik dynamic configuration — per-service routers
# Hot-reloaded. Edit hostnames to match your deployment environment.
# Place at: $AI_STACK_DIR/configs/traefik/dynamic/services.yaml
#
# Hostname convention:
#   Internal (localhost): webui.localhost, grafana.localhost, etc.
#   LAN/WAN: configure your DNS to point these names to this host.
#
# Replace all hostnames with your actual domain or subdomain before deployment.

http:
  routers:
    openwebui:
      rule: "Host(`openwebui.localhost`)"
      entryPoints:
        - websecure
      service: openwebui
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    grafana:
      rule: "Host(`grafana.localhost`)"
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    flowise:
      rule: "Host(`flowise.localhost`)"
      entryPoints:
        - websecure
      service: flowise
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    prometheus:
      rule: "Host(`prometheus.localhost`)"
      entryPoints:
        - websecure
      service: prometheus
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    authentik:
      rule: "Host(`auth.localhost`)"
      entryPoints:
        - websecure
      service: authentik
      middlewares:
        - secure-headers
      tls: {}

    # MCP endpoint — no Authentik (incompatible with MCP clients that send Bearer tokens).
    # App-level API key auth via knowledge_index_api_key Podman secret handles access control.
    knowledge-index-mcp:
      rule: "PathPrefix(`/mcp`)"
      entryPoints:
        - websecure
      service: knowledge-index
      middlewares:
        - secure-headers
      tls: {}

    # REST API — browser-accessible, protected by Authentik SSO.
    knowledge-index-api:
      rule: "PathPrefix(`/v1`)"
      entryPoints:
        - websecure
      service: knowledge-index
      middlewares:
        - authentik
        - secure-headers
      tls: {}

  services:
    openwebui:
      loadBalancer:
        servers:
          - url: "http://webui.ai-stack:8080"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus.ai-stack:9090"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana.ai-stack:3000"

    flowise:
      loadBalancer:
        servers:
          - url: "http://flowise.ai-stack:3000"

    authentik:
      loadBalancer:
        servers:
          - url: "http://authentik.ai-stack:9000"

    knowledge-index:
      loadBalancer:
        servers:
          - url: "http://knowledge-index.ai-stack:8100"
