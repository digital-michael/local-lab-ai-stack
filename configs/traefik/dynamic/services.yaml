# Traefik dynamic configuration — per-service routers
# Hot-reloaded. Edit hostnames to match your deployment environment.
# Place at: $AI_STACK_DIR/configs/traefik/dynamic/services.yaml
#
# Hostname convention:
#   Internal (localhost): *.stack.localhost
#   LAN/WAN: configure your DNS to point these names to this host.
#
# Security policy: every router MUST include the `authentik` middleware
# unless a documented exception exists (see docs/security-policy.md).

http:
  routers:
    openwebui:
      rule: "Host(`openwebui.stack.localhost`)"
      entryPoints:
        - websecure
      service: openwebui
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    grafana:
      rule: "Host(`grafana.stack.localhost`)"
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    flowise:
      rule: "Host(`flowise.stack.localhost`)"
      entryPoints:
        - websecure
      service: flowise
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    prometheus:
      rule: "Host(`prometheus.stack.localhost`)"
      entryPoints:
        - websecure
      service: prometheus
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    # Exception: Authentik is the identity provider — cannot forwardAuth to itself.
    authentik:
      rule: "Host(`auth.stack.localhost`)"
      entryPoints:
        - websecure
      service: authentik
      middlewares:
        - secure-headers
      tls: {}

    # Exception: MCP + admin endpoints use API key auth (machine-to-machine, not browser SSO).
    # Access control: knowledge_index_api_key Podman secret (API_KEY env var in app).
    # SERVICES.mynetworksettings.com is the controller's LAN FQDN — needed so worker nodes
    # (TC25, SOL) can POST heartbeats to /admin/v1/nodes/{id}/heartbeat over the LAN.
    knowledge-index-admin:
      rule: "(Host(`ki.stack.localhost`) || Host(`SERVICES.mynetworksettings.com`)) && PathPrefix(`/admin`)"
      entryPoints:
        - websecure
      service: knowledge-index
      middlewares:
        - secure-headers
      tls: {}

    knowledge-index-mcp:
      rule: "Host(`ki.stack.localhost`) && PathPrefix(`/mcp`)"
      entryPoints:
        - websecure
      service: knowledge-index
      middlewares:
        - secure-headers
      tls: {}

    knowledge-index-api:
      rule: "Host(`ki.stack.localhost`) && PathPrefix(`/v1`)"
      entryPoints:
        - websecure
      service: knowledge-index
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    litellm:
      rule: "Host(`litellm.stack.localhost`)"
      entryPoints:
        - websecure
      service: litellm
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    qdrant:
      rule: "Host(`qdrant.stack.localhost`)"
      entryPoints:
        - websecure
      service: qdrant
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    minio-console:
      rule: "Host(`minio.stack.localhost`)"
      entryPoints:
        - websecure
      service: minio-console
      middlewares:
        - authentik
        - secure-headers
      tls: {}

    homepage:
      rule: "Host(`dashboard.stack.localhost`)"
      entryPoints:
        - websecure
      service: homepage
      middlewares:
        - authentik
        - secure-headers
      tls: {}

  services:
    openwebui:
      loadBalancer:
        servers:
          - url: "http://webui.ai-stack:8080"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus.ai-stack:9090"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana.ai-stack:3000"

    flowise:
      loadBalancer:
        servers:
          - url: "http://flowise.ai-stack:3000"

    authentik:
      loadBalancer:
        servers:
          - url: "http://authentik.ai-stack:9000"

    knowledge-index:
      loadBalancer:
        servers:
          - url: "http://knowledge-index.ai-stack:8100"

    litellm:
      loadBalancer:
        servers:
          - url: "http://litellm.ai-stack:4000"

    qdrant:
      loadBalancer:
        servers:
          - url: "http://qdrant.ai-stack:6333"

    minio-console:
      loadBalancer:
        servers:
          - url: "http://minio.ai-stack:9001"

    homepage:
      loadBalancer:
        servers:
          - url: "http://homepage.ai-stack:3000"
