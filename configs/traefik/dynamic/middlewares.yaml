# Traefik dynamic configuration — global middlewares
# Hot-reloaded by Traefik. No container restart needed.
# Place at: $AI_STACK_DIR/configs/traefik/dynamic/middlewares.yaml

http:
  middlewares:
    # Redirect HTTP to HTTPS (applied via entrypoint redirect in traefik.yaml)
    # This redirect-to-https middleware can be reused explicitly on routers if needed
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Secure response headers — applied to all user-facing routers
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true

    # Authentik forward-auth middleware
    # Requires Authentik outpost to be running at authentik.ai-stack:9000
    authentik:
      forwardAuth:
        address: "http://authentik.ai-stack:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
