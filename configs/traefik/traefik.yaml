# Traefik static configuration
# Managed by: llm-agent-local-2
# Place at: $AI_STACK_DIR/configs/traefik/traefik.yaml
#
# Changes to this file require a container restart.
# For routing changes, edit files under dynamic/ (hot-reloaded).

# Entrypoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls: {}
  # Internal dashboard and metrics entrypoint — not exposed to host
  internal:
    address: ":8080"

# Dynamic configuration provider
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

# TLS
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256

# TLS certificate stores
certificate:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/tls/cert.pem
        keyFile: /etc/traefik/tls/key.pem

# Ping endpoint for health checks (served on :8080 internal)
ping:
  entryPoint: internal

# Prometheus metrics (served on :8080 internal)
metrics:
  prometheus:
    entryPoint: internal

# Access logs
accessLog:
  format: json

# Traefik API and dashboard (internal only)
api:
  dashboard: true
  insecure: true    # safe because internal entrypoint is not host-published
