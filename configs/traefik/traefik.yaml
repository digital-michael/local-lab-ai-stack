# Traefik static configuration
# Managed by: llm-agent-local-2
# Place at: $AI_STACK_DIR/configs/traefik/traefik.yaml
#
# Changes to this file require a container restart.
# For routing changes, edit files under dynamic/ (hot-reloaded).

# Entrypoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls: {}
  # Internal entrypoint named "traefik" — used by api.insecure, ping, and metrics.
  # NOT published to host (no PublishPort in traefik container config).
  traefik:
    address: ":8080"

  # Tailnet entrypoint — bound to the controller's Headscale CGNAT address.
  # Accessible only to nodes enrolled in the tailnet (WireGuard provides transport security).
  # TLS enabled; workers connect with --insecure (self-signed cert is acceptable on tailnet).
  # Changes to this block require a container restart (static config).
  tailnet:
    address: ":8443"   # container-internal wildcard; host binds to 100.64.0.4:8443 via PublishPort
    http:
      tls: {}

# Dynamic configuration provider
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

# TLS options (static config — cipher suites and minimum version only)
# Default certificate store is configured in dynamic/tls.yaml
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256

# Ping endpoint for health checks (served on :8080 traefik entrypoint)
ping:
  entryPoint: traefik

# Prometheus metrics (served on :8080 traefik entrypoint)
metrics:
  prometheus:
    entryPoint: traefik

# Access logs
accessLog:
  format: json

# Traefik API and dashboard (uses "traefik" entrypoint by default with api.insecure)
api:
  dashboard: true
  insecure: true    # safe because traefik entrypoint is not host-published
