# nginx virtual host — photondatum.space
# Deploy at: /etc/nginx/conf.d/photondatum.conf on the photondatum server
# Reload:    sudo systemctl reload nginx
#
# nginx owns port 80 (HTTP). Caddy owns port 443 (HTTPS via TLS-ALPN-01).
# Both serve the same document root: /var/www/photondatum
#
# Subdomains (auth.*, chat.*, headscale.*) are handled exclusively by Caddy
# on port 443 and do not need nginx blocks.

server {
    listen       80;
    listen       [::]:80;
    server_name  photondatum.space www.photondatum.space;

    root  /var/www/photondatum;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Pass real client IP from any upstream proxy
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   127.0.0.1;
    set_real_ip_from   ::1;
}
